{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-3">Выберите вашего менеджера</h2>
    <p>Для завершения регистрации укажите менеджера, который будет вас курировать.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">Подтвердить выбор</button>
    </form>
  </div>
</div>
{% endblock %}
