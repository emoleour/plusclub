{% extends 'base.html' %}
{% block title %}{% if action == 'create' %}Новая акция{% else %}Редактировать акцию{% endif %} — Плюс Клуб{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-header">
        <h4>{% if action == 'create' %}Добавить акцию{% else %}Редактировать акцию{% endif %}</h4>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
