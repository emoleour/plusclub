{% extends 'base.html' %}
{% block title %}Удаление акции — Плюс Клуб{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card p-4 text-center" style="border-color: #dc3545;">
      <h5 class="text-danger mb-3">Подтверждение удаления</h5>
      <p style="color: #EAEAEA;">Удалить акцию <strong style="color: #FFFFFF;">"{{ promotion.title }}"</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'admin_promotion_list' %}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
