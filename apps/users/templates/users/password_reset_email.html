<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля</title>
</head>
<body style="font-family: 'Inter', Arial, sans-serif; background: #121212; margin: 0; padding: 20px;">
  <div style="max-width: 480px; margin: 0 auto; background: #1E1E1E; border: 1px solid #F5C518; border-radius: 16px; padding: 32px; color: #EAEAEA;">
    <h2 style="color: #F5C518; margin-top: 0;">Сброс пароля</h2>
    <p>Вы получили это письмо, потому что запросили сброс пароля для вашего аккаунта в «Плюс Клубе».</p>
    <p style="margin: 24px 0;">
      <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
         style="display: inline-block; background: #F5C518; color: #121212; font-weight: 600; padding: 12px 28px; border-radius: 12px; text-decoration: none;">
        Сбросить пароль
      </a>
    </p>
    <p style="font-size: 0.9rem; color: #A0A0A0;">Если вы не запрашивали сброс пароля, просто проигнорируйте это письмо.</p>
    <hr style="border-color: rgba(245,197,24,0.2); margin: 24px 0;">
    <p style="font-size: 0.8rem; color: #666;">© {% now "Y" %} Сибавтоматика+. Плюс Клуб.</p>
  </div>
</body>
</html>
