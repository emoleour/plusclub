{% extends 'base.html' %}
{% block title %}Деактивация администратора — Плюс Клуб{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card p-4 text-center" style="border-color: #dc3545;">
      <h5 class="text-danger mb-3">Подтверждение деактивации</h5>
      <p style="color: #EAEAEA;">Деактивировать администратора <strong style="color: #FFFFFF;">{{ admin_user.last_name }} {{ admin_user.first_name }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Деактивировать</button>
        <a href="{% url 'admin_list' %}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
