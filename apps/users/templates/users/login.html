{% extends 'base.html' %}
{% block title %}Вход — Плюс Клуб{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card p-4">
      <h3 class="text-warning mb-4 text-center">Вход</h3>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label" style="color: #EAEAEA;">Email</label>
          <input type="email" name="username" id="id_username" class="form-control" required
                 style="background: #2B2B2B; border-color: #3A3A3A; color: #FFFFFF;">
        </div>
        <div class="mb-3">
          <label for="id_password" class="form-label" style="color: #EAEAEA;">Пароль</label>
          <input type="password" name="password" id="id_password" class="form-control" required
                 style="background: #2B2B2B; border-color: #3A3A3A; color: #FFFFFF;">
        </div>
        {% if form.non_field_errors %}
          <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>
      <hr style="border-color: rgba(245,197,24,0.2); margin: 1.5rem 0;">
      <div class="d-grid gap-2">
        <a href="{% url 'register' %}" class="btn btn-outline-primary">Зарегистрироваться</a>
        <a href="{% url 'password_reset' %}" class="btn btn-outline-primary">Забыли пароль?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
