{% extends 'base.html' %}
{% block title %}Импорт покупок — Плюс Клуб{% endblock %}

{% block content %}
<h2>Импорт истории покупок из CSV</h2>
<hr class="border-warning">

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100">Загрузить</button>
        </form>
      </div>
    </div>
    <div class="mt-3">
      <p class="text-muted">
        CSV должен содержать колонки: <strong>email, дата (ГГГГ-ММ-ДД ЧЧ:ММ), сумма, внешний ID (необязательно)</strong>.
      </p>
    </div>
  </div>
</div>
{% endblock %}
