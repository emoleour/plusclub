{% extends 'base.html' %}
{% block title %}Импорт покупок — Плюс Клуб{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card p-4">
      <h4 class="text-warning mb-4 text-center">Импорт истории покупок из CSV</h4>
      <form method="post" enctype="multipart/form-data" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-3">Загрузить</button>
      </form>
      <p class="text-secondary small mt-3 mb-0">
        CSV должен содержать колонки: <strong style="color: #EAEAEA;">email, дата (ГГГГ-ММ-ДД ЧЧ:ММ), сумма, внешний ID (необязательно)</strong>.
      </p>
    </div>
  </div>
</div>
{% endblock %}
