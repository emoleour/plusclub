{% extends 'base.html' %}
{% block title %}Начислить / списать коины — Плюс Клуб{% endblock %}

{% block content %}
<h2>Начислить или списать Плюс Коины</h2>
<hr class="border-warning">

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body">
        <form method="post" action="{% url 'admin_coin_transfer_process' %}" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="wallet_id" class="form-label">Пользователь</label>
            <select name="wallet_id" id="wallet_id" class="form-select" required>
              <option value="">-- выберите --</option>
              {% for wallet in wallets %}
                <option value="{{ wallet.id }}">{{ wallet.user.email }} ({{ wallet.user.last_name }} {{ wallet.user.first_name }}) — {{ wallet.balance }} коинов</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label for="operation" class="form-label">Тип операции</label>
            <select name="operation" id="operation" class="form-select" required>
              <option value="">-- выберите --</option>
              <option value="earn">Начислить</option>
              <option value="spend">Списать</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="amount" class="form-label">Сумма (коинов)</label>
            <input type="number" name="amount" id="amount" class="form-control" min="1" required>
          </div>
          <div class="mb-3">
            <label for="reason" class="form-label">Причина</label>
            <textarea name="reason" id="reason" rows="2" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Выполнить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
